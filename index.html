<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Inventario</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,500;0,700;1,300&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px 40px; }

  /* Header */
  header {
    padding: 32px 24px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: relative;
    z-index: 1;
  }

  .header-left h1 {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
  }

  .header-left h1 span { color: var(--text); }

  .header-meta {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .badge {
    font-family: var(--mono);
    font-size: 0.7rem;
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .badge-live { border-color: var(--accent3); color: var(--accent3); background: rgba(16,185,129,0.08); }
  .badge-live::before { content: '● '; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .update-time { font-size: 0.78rem; color: var(--muted); font-family: var(--mono); }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    padding: 20px 0 0;
    align-items: center;
  }

  .filter-bar input, .filter-bar select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 14px;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .filter-bar input { flex: 1; min-width: 200px; }
  .filter-bar input::placeholder { color: var(--muted); }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }

  .filter-bar select option { background: var(--surface2); }

  .btn {
    padding: 9px 18px;
    border-radius: 6px;
    border: none;
    font-family: var(--mono);
    font-size: 0.78rem;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: var(--bg); font-weight: 700; }
  .btn-primary:hover { background: #33ddff; box-shadow: 0 0 20px rgba(0,212,255,0.4); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  /* KPI Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    padding-top: 28px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .kpi-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-color, var(--accent));
  }

  .kpi-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: 10px;
  }

  .kpi-value {
    font-family: var(--mono);
    font-size: 2.2rem;
    font-weight: 700;
    line-height: 1;
    color: var(--card-color, var(--accent));
  }

  .kpi-sub {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Charts grid */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 24px;
  }

  @media (max-width: 860px) { .charts-grid { grid-template-columns: 1fr; } }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px;
  }
  .chart-card.wide { grid-column: 1 / -1; }

  .chart-title {
    font-family: var(--mono);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 18px;
  }

  .chart-wrap { position: relative; height: 250px; }
  .chart-wrap-tall { position: relative; height: 320px; }

  /* Table */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-top: 24px;
    overflow: hidden;
  }

  .table-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .table-title {
    font-family: var(--mono);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
  }

  .table-count {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--accent);
  }

  .table-wrap { overflow-x: auto; max-height: 480px; overflow-y: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }

  thead th {
    position: sticky;
    top: 0;
    background: var(--surface2);
    padding: 12px 16px;
    text-align: left;
    font-family: var(--mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--text); }
  thead th.sorted { color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid rgba(30, 45, 69, 0.5);
    transition: background 0.15s;
  }
  tbody tr:hover { background: var(--surface2); }

  td { padding: 10px 16px; }

  td.mono { font-family: var(--mono); font-size: 0.78rem; color: var(--muted); }

  .stock-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 700;
  }
  .stock-zero { background: rgba(100,116,139,0.15); color: var(--muted); }
  .stock-low { background: rgba(245,158,11,0.15); color: var(--warn); }
  .stock-ok { background: rgba(16,185,129,0.15); color: var(--accent3); }
  .stock-high { background: rgba(0,212,255,0.15); color: var(--accent); }

  .centro-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 0.7rem;
    background: rgba(124,58,237,0.15);
    color: #a78bfa;
    border: 1px solid rgba(124,58,237,0.3);
  }

  /* Pagination */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--muted);
    flex-wrap: wrap;
    gap: 10px;
  }

  .page-btns { display: flex; gap: 6px; }

  .page-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 0.72rem;
    transition: all 0.15s;
  }
  .page-btn:hover, .page-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    gap: 12px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.85rem;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .no-results { text-align: center; padding: 40px; color: var(--muted); font-family: var(--mono); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>// <span>INVENTARIO</span> DASHBOARD</h1>
  </div>
  <div class="header-meta">
    <span class="badge badge-live">En línea</span>
    <span class="update-time" id="updateTime">Cargando…</span>
  </div>
</header>

<div class="container">

  <!-- Filters -->
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="Buscar por descripción o código de material…" oninput="applyFilters()">
    <select id="centroFilter" onchange="applyFilters()">
      <option value="">Todos los Centros</option>
    </select>
    <select id="almacenFilter" onchange="applyFilters()">
      <option value="">Todos los Almacenes</option>
    </select>
    <select id="stockFilter" onchange="applyFilters()">
      <option value="">Todo el Stock</option>
      <option value="con_stock">Con stock</option>
      <option value="sin_stock">Sin stock</option>
    </select>
    <button class="btn btn-ghost" onclick="resetFilters()">Limpiar</button>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid" id="kpiGrid">
    <div class="loading"><div class="spinner"></div> Cargando datos…</div>
  </div>

  <!-- Charts -->
  <div class="charts-grid" id="chartsGrid" style="display:none">
    <div class="chart-card">
      <div class="chart-title">Stock por Centro</div>
      <div class="chart-wrap"><canvas id="centroChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Stock por Almacén</div>
      <div class="chart-wrap"><canvas id="almacenChart"></canvas></div>
    </div>
    <div class="chart-card wide">
      <div class="chart-title">Top 15 Materiales por Stock</div>
      <div class="chart-wrap-tall"><canvas id="topChart"></canvas></div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Registros de Inventario</span>
      <span class="table-count" id="tableCount">—</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('material')">Código Material</th>
            <th onclick="sortBy('descripcion')">Descripción</th>
            <th onclick="sortBy('centro')">Centro</th>
            <th onclick="sortBy('almacen')">Almacén</th>
            <th onclick="sortBy('stock')">Stock Libre</th>
          </tr>
        </thead>
        <tbody id="tableBody"><tr><td colspan="5"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
      </table>
    </div>
    <div class="pagination">
      <span id="pageInfo">—</span>
      <div class="page-btns" id="pageBtns"></div>
    </div>
  </div>

</div>

<script>
let allData = [];
let filteredData = [];
let currentPage = 1;
let pageSize = 50;
let sortCol = 'stock';
let sortAsc = false;
let centroChart, almacenChart, topChart;

async function loadData() {
  try {
    const res = await fetch('data/inventario.json?' + Date.now());
    const json = await res.json();
    initDashboard(json);
  } catch (e) {
    document.getElementById('kpiGrid').innerHTML = `<div class="no-results">❌ No se pudo cargar data/inventario.json<br><small style="color:var(--muted)">${e.message}</small></div>`;
  }
}

function initDashboard(json) {
  document.getElementById('updateTime').textContent = 'Actualizado: ' + json.fecha_actualizacion;
  allData = json.registros;

  // Populate filters
  const centros = [...new Set(allData.map(r => r.centro))].sort();
  const almacenes = [...new Set(allData.map(r => r.almacen))].sort((a,b) => a-b);
  const centroSel = document.getElementById('centroFilter');
  const almacenSel = document.getElementById('almacenFilter');
  centros.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = 'Centro: ' + c; centroSel.appendChild(o); });
  almacenes.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = 'Almacén: ' + a; almacenSel.appendChild(o); });

  // KPIs
  const r = json.resumen;
  renderKPIs(r);

  // Charts
  document.getElementById('chartsGrid').style.display = 'grid';
  renderCharts(json);

  // Table
  filteredData = [...allData];
  sortData();
  renderTable();
}

function renderKPIs(r) {
  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card" style="--card-color: var(--accent)">
      <div class="kpi-label">Total Registros</div>
      <div class="kpi-value">${r.total_registros.toLocaleString()}</div>
      <div class="kpi-sub">Filas en el inventario</div>
    </div>
    <div class="kpi-card" style="--card-color: var(--accent3)">
      <div class="kpi-label">Con Stock</div>
      <div class="kpi-value">${r.con_stock.toLocaleString()}</div>
      <div class="kpi-sub">${((r.con_stock/r.total_registros)*100).toFixed(1)}% del total</div>
    </div>
    <div class="kpi-card" style="--card-color: var(--warn)">
      <div class="kpi-label">Sin Stock</div>
      <div class="kpi-value">${r.sin_stock.toLocaleString()}</div>
      <div class="kpi-sub">${((r.sin_stock/r.total_registros)*100).toFixed(1)}% en cero</div>
    </div>
    <div class="kpi-card" style="--card-color: var(--accent2)">
      <div class="kpi-label">Unidades Totales</div>
      <div class="kpi-value">${r.stock_total.toLocaleString()}</div>
      <div class="kpi-sub">Libre utilización</div>
    </div>
  `;
}

const COLORS = ['#00d4ff','#7c3aed','#10b981','#f59e0b','#ef4444','#06b6d4','#8b5cf6','#34d399'];

function renderCharts(json) {
  const chartDefaults = {
    plugins: { legend: { labels: { color: '#94a3b8', font: { family: 'Space Mono', size: 11 } } } }
  };

  // Centro chart
  const cCtx = document.getElementById('centroChart').getContext('2d');
  if (centroChart) centroChart.destroy();
  centroChart = new Chart(cCtx, {
    type: 'doughnut',
    data: {
      labels: json.por_centro.map(c => c.Centro),
      datasets: [{ data: json.por_centro.map(c => c.stock_total), backgroundColor: COLORS, borderWidth: 0, hoverOffset: 6 }]
    },
    options: {
      ...chartDefaults,
      cutout: '65%',
      plugins: { ...chartDefaults.plugins, tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed.toLocaleString()} uds` } } }
    }
  });

  // Almacen chart
  const aCtx = document.getElementById('almacenChart').getContext('2d');
  if (almacenChart) almacenChart.destroy();
  almacenChart = new Chart(aCtx, {
    type: 'bar',
    data: {
      labels: json.por_almacen.map(a => 'Almacén ' + a.Almacén),
      datasets: [{
        label: 'Stock total',
        data: json.por_almacen.map(a => a.stock_total),
        backgroundColor: COLORS,
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      ...chartDefaults,
      scales: {
        x: { ticks: { color: '#64748b', font: { family: 'Space Mono', size: 10 } }, grid: { color: '#1e2d45' } },
        y: { ticks: { color: '#64748b', font: { family: 'Space Mono', size: 10 } }, grid: { color: '#1e2d45' } }
      }
    }
  });

  // Top materials horizontal bar
  const tCtx = document.getElementById('topChart').getContext('2d');
  if (topChart) topChart.destroy();
  const top = json.top_materiales.slice().reverse();
  topChart = new Chart(tCtx, {
    type: 'bar',
    data: {
      labels: top.map(m => m.material.length > 30 ? m.material.substring(0, 28) + '…' : m.material),
      datasets: [{
        label: 'Unidades',
        data: top.map(m => m.stock),
        backgroundColor: top.map((_, i) => `rgba(0, 212, 255, ${0.3 + (i / top.length) * 0.7})`),
        borderColor: 'rgba(0, 212, 255, 0.6)',
        borderWidth: 1,
        borderRadius: 3,
        borderSkipped: false
      }]
    },
    options: {
      ...chartDefaults,
      indexAxis: 'y',
      scales: {
        x: { ticks: { color: '#64748b', font: { family: 'Space Mono', size: 10 } }, grid: { color: '#1e2d45' } },
        y: { ticks: { color: '#94a3b8', font: { family: 'Space Mono', size: 9 } }, grid: { color: 'transparent' } }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const centro = document.getElementById('centroFilter').value;
  const almacen = document.getElementById('almacenFilter').value;
  const stockF = document.getElementById('stockFilter').value;

  filteredData = allData.filter(r => {
    if (search && !r.descripcion.toLowerCase().includes(search) && !r.material.includes(search)) return false;
    if (centro && r.centro !== centro) return false;
    if (almacen && r.almacen != almacen) return false;
    if (stockF === 'con_stock' && r.stock <= 0) return false;
    if (stockF === 'sin_stock' && r.stock > 0) return false;
    return true;
  });
  currentPage = 1;
  sortData();
  renderTable();
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('centroFilter').value = '';
  document.getElementById('almacenFilter').value = '';
  document.getElementById('stockFilter').value = '';
  applyFilters();
}

function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = col !== 'stock'; }
  sortData();
  renderTable();
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  event.target.classList.add('sorted');
}

function sortData() {
  filteredData.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') va = va.toLowerCase(), vb = vb.toLowerCase();
    return sortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
  });
}

function stockClass(s) {
  if (s === 0) return 'stock-zero';
  if (s < 5) return 'stock-low';
  if (s < 50) return 'stock-ok';
  return 'stock-high';
}

function renderTable() {
  const total = filteredData.length;
  const pages = Math.ceil(total / pageSize);
  const start = (currentPage - 1) * pageSize;
  const slice = filteredData.slice(start, start + pageSize);

  document.getElementById('tableCount').textContent = total.toLocaleString() + ' registros';
  document.getElementById('pageInfo').textContent = `Pág. ${currentPage} de ${pages} · ${total.toLocaleString()} resultados`;

  if (!slice.length) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="5"><div class="no-results">Sin resultados para los filtros aplicados</div></td></tr>';
  } else {
    document.getElementById('tableBody').innerHTML = slice.map(r => `
      <tr>
        <td class="mono">${r.material}</td>
        <td>${r.descripcion}</td>
        <td><span class="centro-tag">${r.centro}</span></td>
        <td class="mono">${r.almacen}</td>
        <td><span class="stock-pill ${stockClass(r.stock)}">${r.stock.toLocaleString()}</span></td>
      </tr>
    `).join('');
  }

  // Pagination buttons
  const maxBtns = 7;
  const btns = [];
  btns.push(`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`);
  let lo = Math.max(1, currentPage - 3), hi = Math.min(pages, lo + maxBtns - 1);
  if (hi - lo < maxBtns - 1) lo = Math.max(1, hi - maxBtns + 1);
  for (let i = lo; i <= hi; i++) btns.push(`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`);
  btns.push(`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`);
  document.getElementById('pageBtns').innerHTML = btns.join('');
}

function goPage(n) {
  const pages = Math.ceil(filteredData.length / pageSize);
  if (n < 1 || n > pages) return;
  currentPage = n;
  renderTable();
  document.querySelector('.table-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

loadData();
</script>
</body>
</html>
